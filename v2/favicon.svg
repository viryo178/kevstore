<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-labelledby="title desc">
  <title id="title">KEVS Store</title>
  <desc id="desc">KEVS Store gold and silver circular logo.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff0a6"/>
      <stop offset=".42" stop-color="#f7c84d"/>
      <stop offset="1" stop-color="#9f6815"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".36" stop-color="#d8d8d8"/>
      <stop offset=".7" stop-color="#8a8a8a"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity=".7"/>
    </filter>
  </defs>

  <rect width="640" height="520" fill="#000"/>
  <circle cx="320" cy="262" r="224" fill="none" stroke="#111" stroke-width="16"/>
  <path d="M92 246a232 232 0 0 1 429-43" fill="none" stroke="url(#gold)" stroke-linecap="square" stroke-width="16"/>
  <path d="M96 278a232 232 0 0 0 416 51" fill="none" stroke="url(#silver)" stroke-linecap="square" stroke-width="14"/>

  <g filter="url(#shadow)" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic">
    <text x="28" y="308" font-size="172" fill="url(#gold)" stroke="#5d3a09" stroke-width="3">K</text>
    <text x="174" y="300" font-size="146" fill="url(#silver)" stroke="#4d4d4d" stroke-width="3">EVS</text>
  </g>

  <g font-family="Arial Black, Impact, sans-serif" font-weight="900" letter-spacing="16">
    <line x1="138" y1="374" x2="204" y2="374" stroke="url(#gold)" stroke-width="6"/>
    <text x="226" y="392" font-size="48" fill="#fff" transform="skewX(-8)">STORE</text>
    <line x1="438" y1="374" x2="504" y2="374" stroke="url(#gold)" stroke-width="6"/>
  </g>

  <path d="M272 430h96l-48 20z" fill="url(#gold)"/>
</svg>
